name: 'Blackout Secure Nginx Config Validator'
description: 'Pre-merge `nginx -t` validation for in-repo nginx config trees, with `envsubst` template rendering.'
author: 'Blackout Secure'

branding:
  color: 'green'
  icon: 'check-circle'

inputs:
  config_path:
    description: >-
      Repo-relative path to your `nginx.conf` (no leading `./`). Mounted
      read-only into the validation container at `/etc/nginx/nginx.conf`.
      Defaults to a common docker-image-style layout
      (`root/etc/nginx/nginx.conf`).
    required: false
    default: 'root/etc/nginx/nginx.conf'
  templates_path:
    description: >-
      Repo-relative path to a directory containing `*.conf.template` files
      (no leading `./`). Each `<name>.conf.template` is rendered via
      `envsubst` into `<templates_target_dir>/<name>.conf` inside the
      validation container. Missing or empty directories are tolerated —
      only `nginx.conf` is validated in that case. Set to an empty string
      to disable template rendering entirely.
    required: false
    default: 'root/etc/nginx/http.d'
  template_vars:
    description: >-
      Newline-separated `KEY=VALUE` pairs forwarded to `envsubst` when
      rendering templates. Only the listed keys are substituted (we pass
      a positional `${KEY}` list to `envsubst`), so unrelated `${...}`
      strings — for example nginx's own `$remote_addr`, `$status` — pass
      through unchanged. Keys must match `[A-Za-z_][A-Za-z0-9_]*`;
      values must not contain newlines.
    required: false
    default: ''
  templates_target_dir:
    description: >-
      Absolute path inside the validation container where rendered
      templates land. Must match the `include` directive in your
      `nginx.conf`. The default works for the
      `include /run/nginx/http.d/*.conf;` convention.
    required: false
    default: '/run/nginx/http.d'
  nginx_image:
    description: >-
      Container image used for validation. Defaults to the LinuxServer.io
      nginx image (matches the runtime of the BOS docker-* repos). Any
      OCI-compatible image works as long as it ships `nginx` on `PATH`;
      `envsubst` is auto-installed via the image's package manager (apk /
      apt / dnf / yum) when templates are in use and gettext is missing.
      Pin to a specific tag so Dependabot's `docker` ecosystem can bump
      it.
    required: false
    default: 'lscr.io/linuxserver/nginx:latest'
  auto_fill_unknown_vars:
    description: >-
      Fallback value substituted for any `${UPPERCASE_VAR}` reference
      found in your `*.conf.template` files but **not** declared in
      `template_vars`. The default `127.0.0.1` makes most templates
      validate out-of-the-box because the common unmet reference is a
      literal hostname in `proxy_pass http://${UPSTREAM_HOST}:8000;` —
      and `nginx -t` resolves literal upstream hostnames at config-load
      time, so an unresolvable name (or an empty expansion) fails the
      check. Auto-fills are logged with a `WARNING` and a list of the
      affected keys so you know to add them to `template_vars`. Set to
      an empty string (`auto_fill_unknown_vars: ''`) for strict mode
      where undeclared `${UPPERCASE_VAR}` tokens pass through to nginx
      untouched and surface as parse errors. The heuristic targets
      uppercase names only, so nginx-native variables like
      `${remote_addr}` and `${host}` are never matched.
    required: false
    default: '127.0.0.1'

outputs:
  validated:
    description: '`true` when `nginx -t` exits 0; otherwise the step fails before this is written.'
    value: ${{ steps.validate.outputs.validated }}

runs:
  using: composite
  steps:
    - id: validate
      shell: bash
      env:
        CONFIG_PATH: ${{ inputs.config_path }}
        TEMPLATES_PATH: ${{ inputs.templates_path }}
        TEMPLATE_VARS: ${{ inputs.template_vars }}
        TEMPLATES_TARGET_DIR: ${{ inputs.templates_target_dir }}
        NGINX_IMAGE: ${{ inputs.nginx_image }}
        AUTO_FILL_UNKNOWN_VARS: ${{ inputs.auto_fill_unknown_vars }}
      run: bash "${GITHUB_ACTION_PATH}/src/validate.sh"
