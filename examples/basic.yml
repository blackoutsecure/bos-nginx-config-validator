# Example: PR / push CI gate for an in-repo nginx config tree using the
# common docker-image layout (root/etc/nginx/nginx.conf + http.d templates).
#
# Drop this file at .github/workflows/lint-nginx.yml in your consumer repo.
name: Lint nginx config

on:
  push:
    branches: [main]
    paths:
      - 'root/etc/nginx/**'
      - '.github/workflows/lint-nginx.yml'
  pull_request:
    paths:
      - 'root/etc/nginx/**'
      - '.github/workflows/lint-nginx.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-nginx-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: nginx -t
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: blackoutsecure/bos-nginx-config-validate@v1
        with:
          # Placeholder values used only at validation time. Production
          # values get resolved at container start by your own init scripts.
          template_vars: |
            APP_PORT=8080
            UPSTREAM_HOST=127.0.0.1
