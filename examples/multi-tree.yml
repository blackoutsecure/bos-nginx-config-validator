# Example: a repo with two or more nginx config trees (e.g. one per
# microservice). Validate each tree with its own placeholder values.
name: Lint nginx configs

on:
  push:
    branches: [main]
    paths:
      - 'services/**/nginx/**'
      - '.github/workflows/lint-nginx.yml'
  pull_request:
    paths:
      - 'services/**/nginx/**'
      - '.github/workflows/lint-nginx.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-nginx-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: nginx -t (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: blackoutsecure/bos-nginx-config-validate@v1
        with:
          config_path: services/frontend/nginx/nginx.conf
          templates_path: services/frontend/nginx/http.d
          template_vars: |
            FRONTEND_PORT=8080
            STATIC_ROOT=/srv/www

  api:
    name: nginx -t (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: blackoutsecure/bos-nginx-config-validate@v1
        with:
          config_path: services/api/nginx/nginx.conf
          templates_path: services/api/nginx/http.d
          template_vars: |
            API_PORT=9000
            UPSTREAM_HOST=api-backend
