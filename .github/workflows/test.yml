name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    name: bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install bats
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run unit tests (no Docker required)
        run: bats test/unit/

  integration:
    name: integration (real nginx image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate fixture — passes
        id: ok
        uses: ./
        with:
          config_path: test/fixtures/basic/nginx.conf
          templates_path: test/fixtures/basic/http.d
          template_vars: |
            APP_PORT=8080
            UPSTREAM_HOST=127.0.0.1

      - name: Assert validated=true
        run: |
          test "${{ steps.ok.outputs.validated }}" = "true"

      - name: Validate fixture — plain conf only, no templates
        uses: ./
        with:
          config_path: test/fixtures/plain/nginx.conf
          templates_path: ''
