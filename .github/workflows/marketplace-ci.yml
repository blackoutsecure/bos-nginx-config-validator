#
# WHERE THIS LIVES: on the `dev` branch only. `main` is the curated
# GitHub Marketplace artifact and MUST contain zero workflow files.
#
# WHAT IT DOES: runs the Blackout Secure Marketplace pre-publish stack
# on every PR into `dev` and every push to `dev`:
#
#   1. `check`            — validates `action.yml`, branding, manifest,
#                           README/LICENSE/NOTICE, community-health files.
#   2. `branding preview` — renders the Marketplace listing card SVG
#                           as a build artifact for visual review.
#   3. `name check`       — opt-in pre-publish name availability check
#                           (RECOMMENDED: run via `workflow_dispatch`
#                           before the first Marketplace publish, since
#                           this repo has no published Marketplace
#                           listing yet).

name: Marketplace CI

"on":
  pull_request:
    branches: ['dev']
  push:
    branches: ['dev']
  workflow_dispatch:
    inputs:
      run_name_check:
        description: 'Run the Marketplace name availability check (one-shot before first publish).'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: marketplace-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: blackoutsecure/bos-automation-hub/.github/workflows/marketplace-action-ci.yml@main
    with:
      action_yml_path: 'action.yml'
      fail_on_warning: false
      skip_checks: ''
      require_security:        'warn'
      require_code_of_conduct: 'warn'
      require_contributing:    'warn'
      run_branding_preview: true
      run_name_check: ${{ github.event_name == 'workflow_dispatch' && inputs.run_name_check || false }}
