#
# `workflow_dispatch`-only release pipeline. Promotes the allowlisted
# files from `dev` to `main`, tags `main` at the resulting commit,
# and publishes a GitHub Release.
#
# Lives on `dev` only — the underlying bos-marketplace-kit `promote`
# composite hard-blocks any path under `.github/workflows/**` in the
# allowlist.
#
# FIRST PUBLISH: this repo has not been published to the GitHub
# Marketplace yet (no SemVer tag exists). The first release dispatch
# will:
#   1. Promote the allowlisted paths from dev to main.
#   2. Create the initial SemVer tag (e.g. v1.0.0).
#   3. Publish a GitHub Release. The operator MUST tick "Publish this
#      Action to the GitHub Marketplace" in the Release UI once;
#      every subsequent release auto-publishes.

name: Release (Marketplace promote)

"on":
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (SemVer, e.g. v1.0.0 — first release for this repo).'
        required: true
        type: string
      dry_run:
        description: 'Dry run (validate + diff, do not push/tag). RECOMMENDED for the first release.'
        required: false
        type: boolean
        default: true
      draft:
        description: 'Publish the GitHub Release as a draft.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    uses: blackoutsecure/bos-automation-hub/.github/workflows/release-promote.yml@main
    permissions:
      contents: write
    with:
      source_branch: 'dev'
      target_branch: 'main'

      # ----- Allowlist -----------------------------------------------------
      # This is a shell composite Action (`runs: composite`) that
      # executes `src/validate.sh`. The `src/` tree IS the runtime
      # and must be promoted to main alongside `action.yml` and the
      # Marketplace metadata files.
      #
      # `test/` is dev-only — kept off main to keep the Marketplace
      # listing artifact lean.
      allowlist_paths: |
        action.yml
        src
        README.md
        LICENSE
        NOTICE

      include_dependabot_config: true
      include_github_metadata: true
      extra_sync_paths: ''

      tag_name: ${{ inputs.tag_name }}
      dry_run:  ${{ inputs.dry_run }}

      release_template_path:  ''
      release_extra_context:  |
        REPO=${{ github.repository }}
        TAG=${{ inputs.tag_name }}
      release_draft:          ${{ inputs.draft }}
      release_prerelease:     ''
      release_make_latest:    'true'
      release_generate_notes: true
