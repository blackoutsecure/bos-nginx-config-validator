#
# Fails any PR into `main` that would add `.github/workflows/**`
# (Marketplace publishing prerequisite) or remove a required runtime
# artifact (action.yml, src, README, LICENSE, NOTICE, dependabot config).

name: Marketplace guard

"on":
  pull_request_target:
    branches: ['main']
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: marketplace-guard-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    uses: blackoutsecure/bos-automation-hub/.github/workflows/marketplace-repo-guard.yml@main
    with:
      pr_base_sha:        ${{ github.event.pull_request.base.sha }}
      pr_head_sha:        ${{ github.event.pull_request.head.sha }}
      check_pr_diff:      true
      check_tree_state:   true
      require_action_yml: true
      blocked_paths: |
        .github/workflows/
      # `required_paths` are enforced on the BASE branch tree. Until
      # the first promote populates `main`, the only file guaranteed
      # to exist on main is action.yml + LICENSE + README.md +
      # NOTICE + .github/dependabot.yml (whatever ships in the
      # initial promote allowlist). Keep this list narrow until then.
      required_paths: |
        .github/dependabot.yml
        action.yml
        src
        LICENSE
        NOTICE
        README.md
